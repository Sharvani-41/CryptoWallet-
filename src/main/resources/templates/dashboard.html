<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CryptoWallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .welcome-container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            margin: 5px;
        }
        .btn-outline-primary {
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            margin: 5px;
        }
    </style>
</head>
<body>
<div class="welcome-container">
    <h1 class="mb-3">Welcome to CryptoWallet</h1>
    <p class="text-muted mb-4">Your secure cryptocurrency wallet solution</p>

    <div class="mt-4">
        <a href="/register" class="btn btn-primary">Register</a>
        <a href="/login" class="btn btn-outline-primary">Login</a>
        <a href="/home" class="btn btn-success">Go to Home</a>
    </div>
</div>
</body>
</html>
